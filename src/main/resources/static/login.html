<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 - 澳门微气候-电网-建筑综合智慧治理平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #0f1f2d 100%);
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
}
.login-box {
    background: rgba(18,28,46,0.9); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 40px 36px; width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); backdrop-filter: blur(12px);
}
.login-box h2 {
    text-align: center; color: #e8edf3; font-size: 20px; margin-bottom: 6px;
}
.login-box .subtitle {
    text-align: center; color: #667; font-size: 14px; margin-bottom: 28px;
}
.form-group { margin-bottom: 18px; }
.form-group label { display: block; color: #889; font-size: 13px; margin-bottom: 6px; }
.form-group input {
    width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    color: #e8edf3; font-size: 14px; outline: none; transition: border 0.2s;
}
.form-group input:focus { border-color: #0F7B6B; }
.btn-login {
    width: 100%; padding: 11px; background: #0F7B6B; border: none; border-radius: 6px;
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
    transition: background 0.2s;
}
.btn-login:hover { background: #0d6b5d; }
.error-msg { color: #E74C3C; font-size: 12px; text-align: center; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="login-box">
    <h2>澳门综合智慧治理平台</h2>
    <div class="subtitle">微气候-电网-建筑</div>
    <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="btn-login" id="btnLogin">登 录</button>
    <div class="error-msg" id="errorMsg"></div>
</div>
<script>
// 已登录则直接跳转
fetch('/api/auth/check').then(r => r.json()).then(d => {
    if (d.authenticated) location.replace('/');
});

document.getElementById('btnLogin').addEventListener('click', function() {
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value;
    if (!u || !p) {
        showError('请输入用户名和密码');
        return;
    }
    fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
    }).then(r => r.json()).then(d => {
        if (d.success) {
            location.replace('/');
        } else {
            showError(d.message || '登录失败');
        }
    }).catch(function() { showError('网络错误，请重试'); });
});

document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
});

function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}
</script>
</body>
</html>
