<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>澳门数字气象系统</title>
    <link href="https://cdn.jsdelivr.net/npm/cesium@1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cesium@1.110/Build/Cesium/Cesium.js"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* 顶部导航 */
        #navbar {
            height: 50px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: #fff;
        }
        #navbar button {
            margin-right: 10px;
            padding: 8px 15px;
            background: #222;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 3px;
        }
        #navbar button.active {
            background: #4ECDC4;
            color: black;
        }

        /* 页面容器 */
        #content {
            position: absolute;
            top: 50px; /* 导航栏高度 */
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* 首页 */
        #homePage, #monitorPage, #dataPage {
            width: 100%;
            height: 100%;
            display: none; /* 默认隐藏 */
        }

        /* 首页 Cesium 地图 */
        #cesiumContainer {
            width: 100%;
            height: 100%;
        }

        /* 信息面板 */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            z-index: 1000;
            display: none;
        }
        .info-title { font-size:18px;font-weight:bold;margin-bottom:15px;color:#4ECDC4;border-bottom:2px solid #4ECDC4;padding-bottom:5px;}
        .info-item { margin:8px 0; display:flex; justify-content:space-between;}
        .info-label {color:#CCC;}
        .info-value {color:white;font-weight:bold;}
        .close-btn { position:absolute; top:10px; right:10px; background:#FF6B6B; color:white; border:none; width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:14px; line-height:1;}
        .hint {position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.7); color:white; padding:10px 15px; border-radius:5px; font-size:14px;}

        /* 监控页面 */
<!--        #monitorPage {-->
<!--            display: flex;-->
<!--            height: 100%;-->
<!--        }-->

        #cameraList {
            width: 200px;
            background: #222;
            color: #fff;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        #cameraList button {
            width: 100%;
            margin-bottom: 8px;
            padding: 8px;
            background: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }
        #cameraList button.active { background: #4ECDC4; color: black; }

        #videoPlayer {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #videoPlayer video {
            width: 95%;
            height: 95%;
            object-fit: contain;
            background: #000;
        }

        /* 数据记录页面示例 */
        #dataPage {
            padding: 20px 0;
            background: #f5f5f5;
            overflow: auto;
            width: 100%;        /* 添加这一行 */
            box-sizing: border-box; /* 添加这一行，确保padding不影响总宽度 */
        }
        #dataPage > div:last-child {
    width: 100%;
    box-sizing: border-box;
    padding: 0 20px; /* 添加左右内边距，让图表不要贴边 */
}
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<div id="navbar">
    <button id="btnHome" class="active">首页</button>
    <button id="btnMonitor">监控</button>
    <button id="btnData">数据记录</button>
</div>

<div id="content">
    <!-- 首页 -->
    <div id="homePage">
        <div id="cesiumContainer"></div>
        <div id="infoPanel" class="info-panel">
            <div class="info-title" id="stationName"></div>
            <div>温度：<span id="tempValue"></span> °C</div>
            <div>湿度：<span id="humidityValue"></span> %</div>
            <div>风速：<span id="windSpeedValue"></span> km/h</div>
            <div>风向：<span id="windDirValue"></span></div>
            <div>一小时雨量：<span id="rainHourValue"></span> mm</div>
        </div>
    </div>

    <!-- 监控页面 -->
    <div id="monitorPage">
        <div id="cameraList">
            <button class="active" data-src="video/demo.mp4">摄像头1</button>
            <button data-src="video/demo.mp4">摄像头2</button>
            <button data-src="video/demo.mp4">摄像头3</button>
        </div>
        <div id="videoPlayer">
            <video id="cameraVideo" src="video/demo.mp4" controls autoplay muted></video>
        </div>
    </div>

    <!-- 数据记录页面 -->
    <div id="dataPage">
        <!-- 优化后的头部区域 -->
        <!-- 优化后的头部区域 -->
        <div style="background: white; padding: 20px; margin: 0 20px 20px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; flex-wrap: wrap; gap: 20px;">
            <h2 style="margin: 0; color: #333; font-size: 24px; font-weight: 500; min-width: fit-content;">📊 数据记录</h2>

            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; flex: 1;">
                <!-- 站点选择器 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="color: #666; font-size: 14px; white-space: nowrap;">📍 站点</span>
                    <select id="stationSelect" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 180px; background: white;">
                        onmouseover="this.style.borderColor='#4ECDC4'"
                        onmouseout="this.style.borderColor='#ddd'">
                        <option value="">选择站点</option>
                        <option>紀念孫中山市政公園</option>
                        <option>外港</option>
                        <option>大炮台</option>
                        <option>大潭山</option>
                        <option>路環市區</option>
                        <option>黑沙環</option>
                        <option>東亞運大馬路</option>
                        <option>澳門大學</option>
                        <option>媽閣</option>
                        <option>九澳</option>
                    </select>
                </div>

                <!-- 日期选择器 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="color: #666; font-size: 14px; white-space: nowrap;">📅 日期</span>
                    <input type="date" id="dateInput" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: white;">
                </div>

                <!-- 查询按钮 -->
                <button id="loadDataBtn" style="padding: 8px 24px; background: #4ECDC4; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap;">
                    🔍 查询数据
                </button>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 20px;">
            <div id="tempChart" style="width:100%;height:400px;"></div>
            <div id="humidityChart" style="width:100%;height:400px;"></div>
            <div id="windChart" style="width:100%;height:400px;"></div>
            <div id="rainChart" style="width:100%;height:400px;"></div>
        </div>
    </div>
<script src="/js/stations.js"></script>
<script src="/js/cesium-init.js"></script>
<script src="/js/ui.js"></script>
<script>
    const pages = {
        home: document.getElementById('homePage'),
        monitor: document.getElementById('monitorPage'),
        data: document.getElementById('dataPage')
    };
    const btns = {
        home: document.getElementById('btnHome'),
        monitor: document.getElementById('btnMonitor'),
        data: document.getElementById('btnData')
    };

function showPage(name) {
    for (const p in pages) pages[p].style.display = 'none';
    for (const b in btns) btns[b].classList.remove('active');
    pages[name].style.display = 'flex';
    if(name==='home') pages[name].style.display='block'; // 首页不flex
    btns[name].classList.add('active');

    // 如果是数据页面，延迟一下重新设置图表
    if (name === 'data') {
        setTimeout(() => {
            // 如果已经有数据，重新设置选项
            const station = document.getElementById('stationSelect').value;
            const date = document.getElementById('dateInput').value;
            if (station && date) {
                renderChart(station, date);
            } else {
                // 如果没有数据，至少调整大小
                tempChart.resize();
                humidityChart.resize();
                windChart.resize();
                rainChart.resize();
            }
        }, 100); // 稍微延迟确保DOM完全显示
    }
}
    btns.home.addEventListener('click', ()=>showPage('home'));
    btns.monitor.addEventListener('click', ()=>showPage('monitor'));
    btns.data.addEventListener('click', ()=>showPage('data'));

    // 监控页面视频切换
    const video = document.getElementById('cameraVideo');
    document.querySelectorAll('#cameraList button').forEach(btn=>{
        btn.addEventListener('click', ()=>{
            document.querySelectorAll('#cameraList button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            video.src = btn.dataset.src;
            video.play();
        });
    });

    // --- 数据记录页面 ECharts ---
 // 创建四个独立的图表实例
    const tempChart = echarts.init(document.getElementById('tempChart'));
    const humidityChart = echarts.init(document.getElementById('humidityChart'));
    const windChart = echarts.init(document.getElementById('windChart'));
    const rainChart = echarts.init(document.getElementById('rainChart'));

    function renderChart(station, date) {
        axios.get(`/api/history/${encodeURIComponent(station)}`)
            .then(res => {
                const allData = res.data;
                const dataOfDay = allData.filter(d => d.recordTime.startsWith(date));

                const timePoints = [];
                const temperature = [];
                const humidity = [];
                const windSpeed = [];
                const rainHour = [];

                for (let h = 0; h < 24; h++) {
                    for (let m = 0; m < 60; m += 15) { // 每15分钟
                        const hh = h.toString().padStart(2,'0');
                        const mm = m.toString().padStart(2,'0');
                        const t = `${hh}:${mm}`;
                        timePoints.push(t);

                        const record = dataOfDay.find(d => d.recordTime.includes(`${hh}:${mm}:`));
                        if(record){
                            temperature.push(record.temperature);
                            humidity.push(record.humidity);
                            windSpeed.push(record.windSpeed);
                            rainHour.push(record.rainHour);
                        } else {
                            temperature.push(null);
                            humidity.push(null);
                            windSpeed.push(null);
                            rainHour.push(null);
                        }
                    }
                }

                // 温度图表
                const tempOption = {
                    title: { text: '温度 (℃)', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    grid: { left: '10%', right: '10%', bottom: '15%', top: '20%', containLabel: true },
                    xAxis: { type: 'category', boundaryGap: false, data: timePoints },
                    yAxis: { type: 'value', name: '温度(℃)' },
                    series: [{ name: '温度', type: 'line', smooth: true, data: temperature, itemStyle: { color: '#FF6B6B' }}]
                };

                // 湿度图表
                const humidityOption = {
                    title: { text: '湿度 (%)', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    grid: { left: '10%', right: '10%', bottom: '15%', top: '20%', containLabel: true },
                    xAxis: { type: 'category', boundaryGap: false, data: timePoints },
                    yAxis: { type: 'value', name: '湿度(%)' },
                    series: [{ name: '湿度', type: 'line', smooth: true, data: humidity, itemStyle: { color: '#4ECDC4' }}]
                };

                // 风速图表
                const windOption = {
                    title: { text: '风速 (m/s)', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    grid: { left: '10%', right: '10%', bottom: '15%', top: '20%', containLabel: true },
                    xAxis: { type: 'category', boundaryGap: false, data: timePoints },
                    yAxis: { type: 'value', name: '风速(m/s)' },
                    series: [{ name: '风速', type: 'line', smooth: true, data: windSpeed, itemStyle: { color: '#FFD93D' }}]
                };

                // 降雨量图表
                const rainOption = {
                    title: { text: '降雨量 (mm)', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    grid: { left: '10%', right: '10%', bottom: '15%', top: '20%', containLabel: true },
                    xAxis: { type: 'category', boundaryGap: false, data: timePoints },
                    yAxis: { type: 'value', name: '降雨量(mm)' },
                    series: [{ name: '降雨量', type: 'line', smooth: true, data: rainHour, itemStyle: { color: '#5A67F2' }}]
                };

                // 渲染四个图表
                tempChart.setOption(tempOption);
                humidityChart.setOption(humidityOption);
                windChart.setOption(windOption);
                rainChart.setOption(rainOption);
            })
            .catch(err => {
                console.error(err);
                alert("加载数据失败");
            });
    }

    // 点击加载按钮
    document.getElementById('loadDataBtn').addEventListener('click', () => {
        const station = document.getElementById('stationSelect').value;
        const date = document.getElementById('dateInput').value;
        if (!station || !date) return alert("请选择站点和日期");

        renderChart(station, date);
    });

    // 监听窗口变化，自动调整所有图表大小
    window.addEventListener('resize', () => {
        tempChart.resize();
        humidityChart.resize();
        windChart.resize();
        rainChart.resize();
    });
    showPage('home');



</script>
</div>
</body>
</html>
